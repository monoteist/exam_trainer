<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тренажёр — Математика | Фармация 1 курс</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f4f0;min-height:100vh;padding:1rem;color:#1a1a1a}
#app{max-width:680px;margin:0 auto}
h1{font-size:18px;font-weight:600;margin-bottom:4px}
.subtitle{font-size:13px;color:#666;margin-bottom:1.25rem}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.score-badge{display:flex;gap:8px;align-items:center}
.badge{font-size:13px;padding:4px 10px;border-radius:8px;border:1px solid #ddd;color:#555;background:#fff}
.badge.correct{background:#edfaed;color:#2a7a2a;border-color:#b3e6b3}
.badge.wrong{background:#fdeaea;color:#b33;border-color:#f5b3b3}
.progress-wrap{background:#e0e0d8;border-radius:99px;height:6px;margin-bottom:1.25rem;overflow:hidden}
.progress-bar{height:100%;background:#4a7cdc;border-radius:99px;transition:width 0.3s}
.question-card{background:#fff;border:1px solid #ddd;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.q-meta{font-size:12px;color:#999;margin-bottom:0.75rem}
.q-text{font-size:15px;font-weight:500;line-height:1.6;margin-bottom:1.25rem}
.options{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:8px;border:1px solid #ddd;cursor:pointer;transition:background 0.15s,border-color 0.15s;font-size:14px;color:#1a1a1a;line-height:1.5;text-align:left;background:#fff;width:100%;font-family:inherit}
.opt:hover:not(:disabled){background:#f7f7f3;border-color:#bbb}
.opt.selected-correct{background:#edfaed;border-color:#2a7a2a;color:#2a7a2a}
.opt.selected-wrong{background:#fdeaea;border-color:#b33;color:#b33}
.opt.show-correct{background:#edfaed;border-color:#2a7a2a;color:#2a7a2a}
.opt:disabled{cursor:default}
.opt-letter{font-weight:600;min-width:18px;font-size:13px;opacity:0.5}
.feedback{margin-top:0.75rem;font-size:13px;padding:8px 12px;border-radius:8px}
.feedback.ok{background:#edfaed;color:#2a7a2a}
.feedback.fail{background:#fdeaea;color:#b33}
.btn{padding:8px 18px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#1a1a1a;font-size:14px;cursor:pointer;transition:background 0.15s;font-family:inherit}
.btn:hover{background:#f0f0ec}
.btn.primary{background:#4a7cdc;color:#fff;border-color:#4a7cdc}
.btn.primary:hover{background:#3a6ccc}
.actions{display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap}
.final-card{text-align:center;padding:2rem 1.25rem;background:#fff;border:1px solid #ddd;border-radius:12px}
.final-score{font-size:48px;font-weight:600;margin:0.5rem 0}
.final-pct{font-size:20px;color:#666;margin-bottom:1.5rem}
.retry-label{font-size:12px;color:#b33;font-weight:600}
</style>
</head>
<body>
<div id="app"></div>
<script>
const ALL_Q=[
  {q:"Действие нахождения производной функции называется:",opts:["потенцирование","дифференцирование","логарифмирование","интегрирование"],c:1},
  {q:"Если при переходе через критическую точку f(х) меняет знак с «+» на «-», то это точка:",opts:["максимума","минимума","перегиба","разрыва"],c:0},
  {q:"Определенный интеграл – это:",opts:["число","множество функций","иррациональное число","функция"],c:0},
  {q:"В чем сущность физического смысла производной первого порядка?",opts:["ускорение","скорость","угловой коэффициент","тангенс угла наклона"],c:1},
  {q:"Найдите общий вид первообразных для функции f(x)=5:",opts:["5x + C (без знака минус)","5 + C","5x + C","5x"],c:2},
  {q:"Чему равно значение производной функции y=5x³+7 в точке х=2:",opts:["30","67","60","0"],c:2},
  {q:"Какое из чисел является иррациональным?",opts:["0,(3)","√25","π","-5/2"],c:2},
  {q:"Сумма рационального и иррационального числа всегда:",opts:["Рациональна","Целое число","Может быть как рациональной, так и иррациональной","Иррациональна"],c:3},
  {q:"Между какими целыми числами находится √12?",opts:["2 и 3","3 и 4","4 и 5","5 и 6"],c:1},
  {q:"Выберите верное утверждение:",opts:["Любое действительное число можно представить в виде десятичной дроби","Любое действительное число можно представить в виде периодической десятичной дроби","Любое иррациональное число можно представить в виде обыкновенной дроби","Между двумя различными рациональными числами нет иррациональных"],c:0},
  {q:"Если число записывается конечной десятичной дробью, то оно:",opts:["Всегда рациональное","Всегда целое","Может быть иррациональным","Никогда не является действительным"],c:0},
  {q:"Число 40 увеличили на 25%. Какое число получили?",opts:["60","65","50","45"],c:2},
  {q:"Вклад в банке составляет 10 000 рублей под 5% годовых. Какая сумма будет через год?",opts:["10 005 руб.","10 500 руб.","15 000 руб.","10 050 руб."],c:1},
  {q:"После уценки на 20% стул стал стоить 2400 рублей. Какова была его исходная цена?",opts:["3000 руб.","2880 руб.","2000 руб.","1920 руб."],c:0},
  {q:"Сколько плоскостей можно провести через одну точку?",opts:["бесконечно много","одну","две","ни одной"],c:0},
  {q:"Если прямая перпендикулярна плоскости, то она перпендикулярна:",opts:["всем прямым в этой плоскости","только пересекающимся прямым","только параллельным прямым","только одной прямой в этой плоскости"],c:0},
  {q:"При каком условии квадратное уравнение ax²+bx+c=0 имеет ровно один корень?",opts:["D=0","D<0","D>0","а<0"],c:0},
  {q:"Решением линейного неравенства -2x>6 является:",opts:["x<3","x>-3","x<-3","x>3"],c:2},
  {q:"Уравнение вида ах+в=0 называется:",opts:["неполным квадратным","линейным","квадратным","показательным"],c:1},
  {q:"Какое из чисел является корнем уравнения x²-5x+6=0?",opts:["1","2","4","-3"],c:1},
  {q:"Два уравнения f(x)=0 и g(x)=0 называются равносильными, если:",opts:["они имеют одинаковое количество корней","множества их корней совпадают","корни первого уравнения являются корнями второго","они решаются одинаковыми способами"],c:1},
  {q:"Теорема Виета для x²+bx+c=0:",opts:["x₁+x₂=b, x₁·x₂=c","x₁+x₂=b, x₁·x₂=-c","x₁+x₂=-b, x₁·x₂=c","x₁+x₂=-b, x₁·x₂=-c"],c:2},
  {q:"ОДЗ уравнения — это:",opts:["множество корней уравнения","промежуток, на котором функция возрастает","множество значений переменной, при которых выражение имеет смысл","значения, которые удобно подставить для проверки"],c:2},
  {q:"Решить систему уравнений — значит:",opts:["найти сумму всех корней каждого уравнения","найти решение каждого уравнения по отдельности","найти все общие решения уравнений системы","перемножить уравнения"],c:2},
  {q:"Найдите дискриминант квадратного уравнения 3x²-7x+2=0:",opts:["73","49","1","25"],c:3},
  {q:"Основными фигурами в стереометрии являются:",opts:["точка, прямая, плоскость","точка, прямая, квадрат","точка, луч, треугольник","прямая, плоскость, шар"],c:0},
  {q:"Две прямые в пространстве называются скрещивающимися, если...",opts:["они не пересекаются","они не лежат в одной плоскости","они имеют общую точку","они лежат в одной плоскости и не пересекаются"],c:1},
  {q:"Если две пересекающиеся прямые одной плоскости параллельны двум прямым другой плоскости, то эти плоскости...",opts:["пересекаются","совпадают","скрещиваются","параллельны"],c:3},
  {q:"Даны две пересекающиеся прямые a и b. Сколько различных плоскостей можно провести через эти прямые?",opts:["бесконечно много","две","одну","ни одной"],c:2},
  {q:"В кубе определите взаимное расположение прямых AA₁ и BC:",opts:["скрещиваются","пересекаются","параллельны","совпадают"],c:0},
  {q:"Две прямые в пространстве называются перпендикулярными, если...",opts:["угол между ними равен 90°","они не пересекаются","угол между ними равен 0°","они лежат в одной плоскости"],c:0},
  {q:"Сколько перпендикуляров можно провести из данной точки к данной плоскости?",opts:["ровно один","ни одного","бесконечно много","два"],c:0},
  {q:"Что такое наклонная, проведенная из данной точки к данной плоскости?",opts:["любая прямая, соединяющая точку с плоскостью","отрезок, соединяющий данную точку с точкой плоскости и не являющийся перпендикуляром","отрезок, лежащий в плоскости","перпендикуляр, опущенный из точки на плоскость"],c:1},
  {q:"Проекцией наклонной на плоскость называется...",opts:["длина перпендикуляра","сама наклонная","отрезок, соединяющий основание перпендикуляра с основанием наклонной","расстояние между основанием перпендикуляра и точкой"],c:2},
  {q:"Теорема о трёх перпендикулярах (прямая формулировка):",opts:["если прямая на плоскости перпендикулярна проекции наклонной, то она перпендикулярна и самой наклонной","если прямая на плоскости не перпендикулярна проекции наклонной, то она перпендикулярна самой наклонной","если прямая на плоскости перпендикулярна наклонной, то она не перпендикулярна её проекции","если прямая перпендикулярна плоскости, то она перпендикулярна любой наклонной"],c:0},
  {q:"Если из одной точки к плоскости проведены перпендикуляр и наклонные, то...",opts:["все наклонные равны","наклонные равны, только если равны их проекции","перпендикуляр длиннее любой наклонной","перпендикуляр короче любой наклонной"],c:3},
  {q:"Если из одной точки к плоскости проведены две равные наклонные, то...",opts:["их проекции могут быть любыми","их проекции равны","они образуют равные углы с плоскостью","они перпендикулярны друг другу"],c:1},
  {q:"Углом между прямой и плоскостью называется...",opts:["угол между прямой и параллельной ей прямой","угол между прямой и перпендикуляром к плоскости","угол между прямой и её проекцией на плоскость","угол между прямой и любой прямой в плоскости"],c:2},
  {q:"Признак перпендикулярности двух плоскостей:",opts:["если одна плоскость пересекает другую","если одна плоскость параллельна другой","если в одной плоскости лежит прямая, параллельная другой плоскости","если плоскость проходит через прямую, перпендикулярную другой плоскости"],c:3},
  {q:"Расстояние от точки до плоскости — это...",opts:["длина любой наклонной","расстояние от точки до любой точки плоскости","длина проекции наклонной","длина перпендикуляра, опущенного из точки на плоскость"],c:3},
  {q:"Как находятся координаты вектора AB?",opts:["x₂-x₁, y₂-y₁, z₂-z₁","x₁+x₂, y₁+y₂, z₁+z₂","x₁-x₂, y₁-y₂, z₁-z₂","x₂+x₁, y₂+y₁, z₂+z₁"],c:0},
  {q:"Что такое координаты точки в пространстве?",opts:["три числа (абсцисса, ордината, аппликата), определяющие положение точки","два числа, определяющие положение точки","расстояние от точки до начала координат","вектор, соединяющий начало координат с точкой"],c:0},
  {q:"Что такое радиус-вектор точки?",opts:["вектор, начало которого находится в начале координат, а конец — в данной точке","вектор, соединяющий две произвольные точки","вектор, перпендикулярный плоскости","вектор с координатами (1,1,1)"],c:0},
  {q:"Векторы называются компланарными, если...",opts:["они параллельны одной прямой","они имеют равные длины","они параллельны одной плоскости (или лежат в одной плоскости)","их скалярное произведение равно нулю"],c:2},
  {q:"Что такое прямоугольная (декартова) система координат в пространстве?",opts:["три взаимно перпендикулярные оси с общим началом","две взаимно перпендикулярные оси","система из одной оси и угла","любая система с началом в точке O"],c:0},
  {q:"Как вычисляются координаты вектора, умноженного на число?",opts:["путём умножения каждой координаты на это число","путём сложения координат с этим числом","путём умножения длины вектора на число, координаты не меняются","число умножается только на первую координату"],c:0},
  {q:"Какой вектор называется единичным (ортом)?",opts:["вектор, длина которого равна 1","вектор, направленный вдоль оси Ох","вектор с координатами (0, 0, 1)","вектор, направленный вдоль оси Оу"],c:0},
  {q:"Что такое тригонометрическая окружность?",opts:["окружность с центром в начале координат и радиусом, равным 1","окружность, по которой движется проекция точки","окружность с центром в начале координат и радиусом, равным 2","окружность, используемая только для определения синуса"],c:0},
  {q:"Как определяется синус произвольного угла α с помощью единичной окружности?",opts:["ордината точки на единичной окружности, полученной поворотом начальной точки (1,0) на угол α","абсцисса этой точки","отношение ординаты к абсциссе этой точки","длина хорды, стягивающей угол"],c:0},
  {q:"Как определяется косинус произвольного угла α с помощью единичной окружности?",opts:["ордината точки на единичной окружности","отношение абсциссы к ординате этой точки","длина дуги окружности","абсцисса точки на единичной окружности, полученной поворотом начальной точки (1,0) на угол α"],c:3},
  {q:"Тангенс произвольного угла α (при cos α≠0) определяется как:",opts:["sin α · cos α","ctg α · cos α","sin α / cos α","tg α · cos α"],c:2},
  {q:"Котангенс произвольного угла α (при sin α≠0) определяется как:",opts:["cos α · sin α","tg α / cos α","sin α / cos α","cos α / sin α"],c:3},
  {q:"Чему равен 1 радиан в градусах?",opts:["60°","≈57,3°","90°","180°"],c:1},
  {q:"Основное соотношение между градусной и радианной мерами:",opts:["360° = 2π рад","90° = 4/π рад","180° = π рад","1° = π рад"],c:2},
  {q:"Синус и косинус произвольного угла могут принимать значения:",opts:["только от 0 до 1","любые действительные числа","только положительные числа","только от -1 до 1 включительно"],c:3},
  {q:"Тангенс и котангенс произвольного угла могут принимать значения:",opts:["только от -1 до 1","только положительные числа","только целые числа","любые действительные числа"],c:3},
  {q:"Какое утверждение о знаках тригонометрических функций ВЕРНО?",opts:["в первой четверти все функции отрицательны","во второй четверти синус положителен, косинус отрицателен","в третьей четверти тангенс отрицателен","в четвертой четверти косинус отрицателен"],c:1},

  {q:"Формулы для отрицательных углов:",opts:["sin(−α)=sin α","sin(−α)=−sin α","cos(−α)=−cos α","tg(−α)=tg α"],c:1},
  {q:"Какой угол (в радианах) соответствует полному обороту по окружности?",opts:["2π","π","2","π/2"],c:0},
  {q:"Какое тождество называется основным тригонометрическим тождеством?",opts:["sin α + cos α = 1","tg α · ctg α = 1","sin²α + cos²α = 1","1 + tg²α = 1/cos α"],c:2},
  {q:"Как выражается тангенс через синус и косинус?",opts:["tg α = 1/sin α","tg α = sin α / cos α","tg α = cos α · sin α","tg α = cos α / sin α"],c:1},
  {q:"Как выражается котангенс через синус и косинус?",opts:["ctg α = cos α / sin α","ctg α = cos α · sin α","ctg α = sin α / cos α","ctg α = 1/cos α"],c:0},
  {q:"Тождество 1 + tg²α = 1/cos²α справедливо при условии, что...",opts:["sin α ≠ 0","cos α ≠ 0","tg α ≠ 0","α — любой угол"],c:1},
  {q:"Тождество 1 + ctg²α = 1/sin²α справедливо при условии, что...",opts:["cos α ≠ 0","ctg α ≠ 0","sin α ≠ 0","α — любой угол"],c:2},
  {q:"Чему равно произведение tg α · ctg α?",opts:["0","-1","sin²α","1"],c:3},
  {q:"Область определения функции y=sin x:",opts:["x∈R (все действительные числа)","x∈[0;2π]","x∈[−1;1]","x≠π/2+πk, k∈Z"],c:0},
  {q:"Область значений функции y=cos x:",opts:["y∈[−1;1]","y∈R","y∈(−∞;+∞)","y∈[0;1]"],c:0},
  {q:"Область определения функции y=tg x:",opts:["x≠π/2+πk, k∈Z","x∈R","x≠πk, k∈Z","x∈[0;π]"],c:0},
  {q:"Область значений функции y=ctg x:",opts:["y∈R","y∈[−1;1]","y≥0","y∈[0;1]"],c:0},
  {q:"Функция y=sin x является:",opts:["чётной","нечётной","ни чётной, ни нечётной","периодической только с периодом π"],c:1},
  {q:"Функция y=cos x является:",opts:["чётной","нечётной","ни чётной, ни нечётной","монотонно возрастающей на всей области определения"],c:0},

function shuffle(a){return a.map(v=>[Math.random(),v]).sort(([a],[b])=>a-b).map(([,v])=>v)}

let questions=shuffle(ALL_Q),wrongQ=[],idx=0,score=0,answered=false,mode='main';
const L=['A','B','C','D'];

function render(){
  const app=document.getElementById('app');
  if(mode==='final'){renderFinal(app);return}
  const q=questions[idx];
  const pct=Math.round((idx/questions.length)*100);
  app.innerHTML=`
    <h1>Тренажёр — Математика</h1>
    <div class="subtitle">Фармация, 1 курс, II семестр · ЧГУ им. А.А. Кадырова</div>
    <div class="header">
      <div style="font-size:13px;color:#555">${mode==='retry'?'<span style="color:#b33;font-weight:600">⟳ Работа над ошибками</span>':'Дифференцированный зачёт'}</div>
      <div class="score-badge">
        <span class="badge correct">✓ ${score}</span>
        <span class="badge wrong">✗ ${wrongQ.length}</span>
        <span class="badge">${idx+1}/${questions.length}</span>
      </div>
    </div>
    <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
    <div class="question-card">
      <div class="q-meta">Вопрос ${idx+1} из ${questions.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">
        ${q.opts.map((o,i)=>`<button class="opt" id="opt${i}" onclick="choose(${i})"><span class="opt-letter">${L[i]}.</span>${o}</button>`).join('')}
      </div>
      <div id="feedback"></div>
    </div>
    <div class="actions" id="actions"></div>
  `;
}

function choose(i){
  if(answered)return;
  answered=true;
  const q=questions[idx];
  document.querySelectorAll('.opt').forEach(o=>o.disabled=true);
  if(i===q.c){
    score++;
    document.getElementById('opt'+i).classList.add('selected-correct');
    document.getElementById('feedback').innerHTML=`<div class="feedback ok">✓ Верно!</div>`;
  } else {
    document.getElementById('opt'+i).classList.add('selected-wrong');
    document.getElementById('opt'+q.c).classList.add('show-correct');
    wrongQ.push(q);
    document.getElementById('feedback').innerHTML=`<div class="feedback fail">✗ Неверно. Правильный ответ: ${L[q.c]}. ${q.opts[q.c]}</div>`;
  }
  document.getElementById('actions').innerHTML=`<button class="btn primary" onclick="next()">Следующий →</button>`;
}

function next(){
  answered=false; idx++;
  if(idx>=questions.length){mode='final';}
  render();
}

function startRetry(){
  mode='retry'; questions=shuffle([...wrongQ]); wrongQ=[]; idx=0; score=0; answered=false; render();
}

function startFresh(){
  mode='main'; questions=shuffle(ALL_Q); wrongQ=[]; idx=0; score=0; answered=false; render();
}

function renderFinal(app){
  const pct=Math.round((score/(score+wrongQ.length))*100)||0;
  const emoji=pct>=80?'🎉':pct>=60?'👍':'📚';
  app.innerHTML=`
    <h1>Тренажёр — Математика</h1>
    <div class="subtitle">Фармация, 1 курс, II семестр · ЧГУ им. А.А. Кадырова</div>
    <div class="final-card" style="margin-top:1rem">
      <div style="font-size:40px;margin-bottom:0.5rem">${emoji}</div>
      <div style="font-size:15px;color:#666;margin-bottom:0.25rem">${mode==='retry'?'Работа над ошибками завершена':'Тест завершён'}</div>
      <div class="final-score">${score} / ${score+wrongQ.length}</div>
      <div class="final-pct">${pct}% правильных ответов</div>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:1.5rem">
        <span class="badge correct" style="font-size:14px">✓ Правильно: ${score}</span>
        <span class="badge wrong" style="font-size:14px">✗ Ошибок: ${wrongQ.length}</span>
      </div>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        ${wrongQ.length>0?`<button class="btn primary" onclick="startRetry()">Повторить ошибки (${wrongQ.length})</button>`:''}
        <button class="btn" onclick="startFresh()">Начать заново</button>
      </div>
    </div>
  `;
}

render();
</script>
